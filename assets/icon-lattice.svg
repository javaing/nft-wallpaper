<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 深色背景漸層 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f1e"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <!-- 格線顏色：科幻青藍 -->
  </defs>

  <g clip-path="url(#rounded)">
    <!-- 背景 -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- 外框木邊（模擬照片中的深色木框） -->
    <rect x="0" y="0" width="512" height="512" rx="72"
          fill="none" stroke="#1a0a04" stroke-width="32"/>

    <!-- ════════════════════════════════════════ -->
    <!-- 不規則三角切割格柵（仿照片風格）       -->
    <!-- 所有線條用粗青藍色，模擬金屬格柵       -->
    <!-- ════════════════════════════════════════ -->

    <g filter="url(#glow)" stroke="#38b6d8" stroke-linecap="round" stroke-linejoin="round" fill="none">

      <!-- 外邊框內線 -->
      <rect x="28" y="28" width="456" height="456" rx="52" stroke-width="14" stroke="#2a9bb8"/>

      <!-- 不規則切割線條群組（仿照片中密集三角格柵）-->
      <!-- stroke-width="11" 模擬照片中粗格柵條 -->
      <g stroke-width="11" stroke="#38b6d8">

        <!-- 左上區塊 -->
        <line x1="28"  y1="160" x2="180" y2="90"/>
        <line x1="28"  y1="280" x2="160" y2="160"/>
        <line x1="120" y1="28"  x2="200" y2="160"/>
        <line x1="240" y1="28"  x2="160" y2="160"/>
        <line x1="160" y1="160" x2="260" y2="200"/>
        <line x1="180" y1="90"  x2="260" y2="200"/>
        <line x1="180" y1="90"  x2="240" y2="28"/>
        <line x1="120" y1="28"  x2="28"  y2="160"/>
        <line x1="28"  y1="280" x2="160" y2="260"/>
        <line x1="160" y1="160" x2="160" y2="260"/>

        <!-- 上中區塊 -->
        <line x1="240" y1="28"  x2="320" y2="28"/>
        <line x1="240" y1="28"  x2="290" y2="130"/>
        <line x1="320" y1="28"  x2="290" y2="130"/>
        <line x1="290" y1="130" x2="380" y2="90"/>
        <line x1="380" y1="90"  x2="400" y2="28"/>
        <line x1="260" y1="200" x2="290" y2="130"/>
        <line x1="290" y1="130" x2="360" y2="200"/>
        <line x1="260" y1="200" x2="360" y2="200"/>

        <!-- 右上區塊 -->
        <line x1="400" y1="28"  x2="484" y2="100"/>
        <line x1="380" y1="90"  x2="484" y2="100"/>
        <line x1="484" y1="100" x2="484" y2="220"/>
        <line x1="380" y1="90"  x2="420" y2="200"/>
        <line x1="420" y1="200" x2="484" y2="220"/>
        <line x1="360" y1="200" x2="420" y2="200"/>

        <!-- 左中區塊 -->
        <line x1="28"  y1="280" x2="28"  y2="380"/>
        <line x1="28"  y1="380" x2="140" y2="340"/>
        <line x1="160" y1="260" x2="140" y2="340"/>
        <line x1="140" y1="340" x2="220" y2="300"/>
        <line x1="160" y1="260" x2="220" y2="300"/>
        <line x1="220" y1="300" x2="260" y2="200"/>
        <line x1="28"  y1="280" x2="160" y2="260"/>

        <!-- 中央區塊 -->
        <line x1="260" y1="200" x2="360" y2="200"/>
        <line x1="260" y1="200" x2="300" y2="310"/>
        <line x1="360" y1="200" x2="300" y2="310"/>
        <line x1="220" y1="300" x2="300" y2="310"/>
        <line x1="300" y1="310" x2="380" y2="320"/>
        <line x1="360" y1="200" x2="380" y2="320"/>
        <line x1="220" y1="300" x2="240" y2="400"/>

        <!-- 右中區塊 -->
        <line x1="420" y1="200" x2="484" y2="220"/>
        <line x1="484" y1="220" x2="484" y2="360"/>
        <line x1="420" y1="200" x2="460" y2="320"/>
        <line x1="460" y1="320" x2="484" y2="360"/>
        <line x1="380" y1="320" x2="460" y2="320"/>
        <line x1="380" y1="320" x2="420" y2="200"/>

        <!-- 左下區塊 -->
        <line x1="28"  y1="380" x2="28"  y2="484"/>
        <line x1="28"  y1="484" x2="140" y2="484"/>
        <line x1="140" y1="340" x2="140" y2="484"/>
        <line x1="140" y1="484" x2="240" y2="400"/>
        <line x1="140" y1="340" x2="240" y2="400"/>
        <line x1="240" y1="400" x2="300" y2="484"/>

        <!-- 下中區塊 -->
        <line x1="240" y1="400" x2="300" y2="310"/>
        <line x1="300" y1="310" x2="380" y2="420"/>
        <line x1="240" y1="400" x2="380" y2="420"/>
        <line x1="300" y1="484" x2="380" y2="420"/>
        <line x1="380" y1="420" x2="440" y2="484"/>
        <line x1="300" y1="484" x2="440" y2="484"/>

        <!-- 右下區塊 -->
        <line x1="460" y1="320" x2="484" y2="360"/>
        <line x1="484" y1="360" x2="484" y2="484"/>
        <line x1="440" y1="484" x2="484" y2="484"/>
        <line x1="460" y1="320" x2="440" y2="484"/>
        <line x1="380" y1="320" x2="380" y2="420"/>
        <line x1="380" y1="420" x2="460" y2="320"/>
      </g>

      <!-- 亮色強調線（幾條主要長線，增加版畫感） -->
      <g stroke-width="13" stroke="#5dd0ed" opacity="0.9">
        <line x1="28"  y1="160" x2="484" y2="220"/>
        <line x1="240" y1="28"  x2="300" y2="484"/>
        <line x1="28"  y1="380" x2="484" y2="360"/>
      </g>
    </g>

    <!-- 暗色遮罩讓交叉區域有深度感 -->
    <rect width="512" height="512" fill="rgba(2,12,26,0.18)" rx="72"/>

    <!-- 外框再疊一層 -->
    <rect x="0" y="0" width="512" height="512" rx="72"
          fill="none" stroke="#0d1f35" stroke-width="28"/>
  </g>
</svg>
