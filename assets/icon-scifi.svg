<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020b18"/>
      <stop offset="100%" stop-color="#041d3a"/>
    </linearGradient>
    <!-- 霓虹發光 -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
    <!-- 掃描線紋理 -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="rgba(0,200,255,0.04)"/>
    </pattern>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <!-- 背景 -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- 掃描線疊加 -->
    <rect width="512" height="512" fill="url(#scanlines)"/>
    <!-- 中心光暈 -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003a6e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020b18" stop-opacity="0"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#centerGlow)"/>

    <!-- ══════════════════════════════════════ -->
    <!-- 外框：雙層科幻邊框                    -->
    <!-- ══════════════════════════════════════ -->
    <rect x="24" y="24" width="464" height="464" rx="12"
          fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3" filter="url(#neon)"/>
    <rect x="32" y="32" width="448" height="448" rx="10"
          fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>

    <!-- 四角切角裝飾（科幻 HUD 感） -->
    <!-- 左上 -->
    <polyline points="32,80 32,32 80,32" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" filter="url(#neon)"/>
    <polyline points="40,72 40,40 72,40" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="square" opacity="0.5"/>
    <!-- 右上 -->
    <polyline points="432,32 480,32 480,80" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" filter="url(#neon)"/>
    <polyline points="440,40 472,40 472,72" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="square" opacity="0.5"/>
    <!-- 左下 -->
    <polyline points="32,432 32,480 80,480" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" filter="url(#neon)"/>
    <polyline points="40,440 40,472 72,472" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="square" opacity="0.5"/>
    <!-- 右下 -->
    <polyline points="480,432 480,480 432,480" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" filter="url(#neon)"/>
    <polyline points="472,440 472,472 440,472" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="square" opacity="0.5"/>

    <!-- 四邊中間刻度 -->
    <line x1="248" y1="24" x2="248" y2="40" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="24" x2="256" y2="44" stroke="#00d4ff" stroke-width="3" filter="url(#neon)"/>
    <line x1="264" y1="24" x2="264" y2="40" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

    <line x1="248" y1="488" x2="248" y2="472" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="488" x2="256" y2="468" stroke="#00d4ff" stroke-width="3" filter="url(#neon)"/>
    <line x1="264" y1="488" x2="264" y2="472" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

    <line x1="24" y1="248" x2="40" y2="248" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="24" y1="256" x2="44" y2="256" stroke="#00d4ff" stroke-width="3" filter="url(#neon)"/>
    <line x1="24" y1="264" x2="40" y2="264" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

    <line x1="488" y1="248" x2="472" y2="248" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="488" y1="256" x2="468" y2="256" stroke="#00d4ff" stroke-width="3" filter="url(#neon)"/>
    <line x1="488" y1="264" x2="472" y2="264" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

    <!-- ══════════════════════════════════════ -->
    <!-- 窗花主體：科幻版版畫窗花             -->
    <!-- ══════════════════════════════════════ -->

    <!-- 外圈八邊形窗花框 -->
    <polygon points="256,92 314,114 356,156 378,214 378,298 356,356 314,398 256,420 198,398 156,356 134,298 134,214 156,156 198,114"
             fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#neon)"/>

    <!-- 八方射線（版畫刻線） -->
    <g filter="url(#neon)" stroke="#00d4ff" stroke-width="2" opacity="0.7" stroke-linecap="round">
      <line x1="256" y1="134" x2="256" y2="174"/>
      <line x1="256" y1="338" x2="256" y2="378"/>
      <line x1="134" y1="256" x2="174" y2="256"/>
      <line x1="338" y1="256" x2="378" y2="256"/>
      <line x1="165" y1="165" x2="192" y2="192"/>
      <line x1="320" y1="320" x2="347" y2="347"/>
      <line x1="347" y1="165" x2="320" y2="192"/>
      <line x1="192" y1="320" x2="165" y2="347"/>
    </g>

    <!-- 中圈：菱形窗格（版畫核心） -->
    <polygon points="256,148 340,232 256,316 172,232"
             fill="rgba(0,40,80,0.6)" stroke="#00d4ff" stroke-width="3" filter="url(#neonStrong)"/>

    <!-- 菱形內四分格線 -->
    <line x1="256" y1="148" x2="256" y2="316" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="172" y1="232" x2="340" y2="232" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>

    <!-- 菱形內四個小菱形 -->
    <polygon points="256,160 298,202 256,222 214,202"
             fill="none" stroke="#00bfff" stroke-width="2" opacity="0.8" filter="url(#neon)"/>
    <polygon points="256,242 298,262 256,316 214,262"
             fill="none" stroke="#00bfff" stroke-width="2" opacity="0.8" filter="url(#neon)"/>
    <polygon points="184,232 214,202 234,232 214,262"
             fill="none" stroke="#00bfff" stroke-width="2" opacity="0.8" filter="url(#neon)"/>
    <polygon points="328,232 298,202 278,232 298,262"
             fill="none" stroke="#00bfff" stroke-width="2" opacity="0.8" filter="url(#neon)"/>

    <!-- 中心六角星（版畫核心花紋） -->
    <polygon points="256,210 270,232 256,254 242,232"
             fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
    <polygon points="232,222 256,218 268,242 244,246"
             fill="#00d4ff" opacity="0.5"/>
    <polygon points="280,222 256,218 244,242 268,246"
             fill="#00d4ff" opacity="0.5"/>

    <!-- 中心亮點 -->
    <circle cx="256" cy="232" r="10" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="256" cy="232" r="5" fill="#00d4ff" filter="url(#neonStrong)"/>

    <!-- ══════════════════════════════════════ -->
    <!-- 四角小窗花                            -->
    <!-- ══════════════════════════════════════ -->
    <!-- 左上 -->
    <g transform="translate(88,88)" filter="url(#neon)" opacity="0.8">
      <polygon points="0,-28 28,0 0,28 -28,0" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="6" fill="#00d4ff"/>
    </g>
    <!-- 右上 -->
    <g transform="translate(424,88)" filter="url(#neon)" opacity="0.8">
      <polygon points="0,-28 28,0 0,28 -28,0" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="6" fill="#00d4ff"/>
    </g>
    <!-- 左下 -->
    <g transform="translate(88,424)" filter="url(#neon)" opacity="0.8">
      <polygon points="0,-28 28,0 0,28 -28,0" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="6" fill="#00d4ff"/>
    </g>
    <!-- 右下 -->
    <g transform="translate(424,424)" filter="url(#neon)" opacity="0.8">
      <polygon points="0,-28 28,0 0,28 -28,0" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="6" fill="#00d4ff"/>
    </g>

    <!-- ══════════════════════════════════════ -->
    <!-- 底部文字列（HUD 風格）                -->
    <!-- ══════════════════════════════════════ -->
    <text x="256" y="448" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="18" font-weight="700"
          letter-spacing="8" fill="#00d4ff" opacity="0.8" filter="url(#neon)">NFT</text>
    <line x1="180" y1="455" x2="332" y2="455" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
